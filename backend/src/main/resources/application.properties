spring.application.name=Proj_Paradigmas

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:proj_paradigmas}
spring.datasource.username=${DB_USER:app_user}
spring.datasource.password=${DB_PASSWORD:app_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Boot Docker Compose support (dev only, see backend/compose.yaml).
# Must be disabled when the app itself runs inside a container.
spring.docker.compose.enabled=${SPRING_DOCKER_COMPOSE_ENABLED:true}

# JWT (troque JWT_SECRET em produção; precisa ter pelo menos 32 caracteres)
jwt.secret=${JWT_SECRET:dev-secret-troque-em-producao-0123456789abcdef0123456789abcdef}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Google Books API Key
google.books.api.key=${GOOGLE_BOOKS_API_KEY:}
nyt.api.key=${NYT_API_KEY:}

