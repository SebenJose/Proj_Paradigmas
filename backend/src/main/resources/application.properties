spring.application.name=Proj_Paradigmas

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:proj_paradigmas}
spring.datasource.username=${DB_USER:app_user}
spring.datasource.password=${DB_PASSWORD:app_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Boot Docker Compose support (dev only, see backend/compose.yaml).
# Must be disabled when the app itself runs inside a container.
spring.docker.compose.enabled=${SPRING_DOCKER_COMPOSE_ENABLED:true}
